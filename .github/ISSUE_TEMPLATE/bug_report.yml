name: 🐛 Bug Report
description: Report a bug or unexpected behavior in CloudSentinel
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please search existing issues before opening a new one.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: When I run `cloudsentinel deploy`, the agent fails to start...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue
      placeholder: |
        1. Run `cloudsentinel deploy --name dev`
        2. Apply the agent DaemonSet
        3. See error in pod logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Affected service
      description: Which CloudSentinel service is affected?
      options:
        - orchestrator (Python CLI)
        - agent (Go DaemonSet)
        - api (FastAPI backend)
        - dashboard (Next.js frontend)
        - ml-pipeline (scikit-learn)
        - infrastructure (Terraform)
        - docs (MkDocs)
        - Multiple services
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CloudSentinel version / commit
      description: What version or commit hash are you running?
      placeholder: "main @ de12568"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide your environment details. Run these commands:
        - `uname -a`
        - `python --version`
        - `go version`
        - `node --version`
        - `kubectl version --client`
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output here
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I have read and agree to the Code of Conduct
          required: true
        - label: I have searched existing issues for duplicates
          required: true
