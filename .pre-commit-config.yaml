# Pre-commit hooks for CloudSentinel
# See https://pre-commit.com for more information
# Run manually: pre-commit run --all-files

repos:
  # === Généraux ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # === Détection de secrets AWS/GCP/Azure/GitHub ===
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
              poetry\.lock|
              package-lock\.json|
              .*\.svg
          )$

  # === Python : ruff (lint + format) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # === Terraform ===
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

  # === Go ===
  # Hooks from dnephin/pre-commit-golang don't work well with Go modules
  # located in subdirectories (our module lives at agent/, not at the root).
  # Instead, we run go vet/test manually from agent/ or via CI.
  # - repo: https://github.com/dnephin/pre-commit-golang
  #   rev: v0.5.1
  #   hooks:
  #     - id: go-fmt
  #     - id: go-vet
  #     - id: go-mod-tidy

  # Local Go hooks that operate correctly on the agent/ subdirectory.
  - repo: local
    hooks:
      - id: go-fmt-agent
        name: go fmt (agent)
        entry: bash -c 'cd agent && gofmt -l -w . && test -z "$(gofmt -l .)"'
        language: system
        files: ^agent/.*\.go$
        pass_filenames: false
      - id: go-vet-agent
        name: go vet (agent)
        entry: bash -c 'cd agent && go vet ./...'
        language: system
        files: ^agent/.*\.go$
        pass_filenames: false

  # === Commits conventionnels ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
