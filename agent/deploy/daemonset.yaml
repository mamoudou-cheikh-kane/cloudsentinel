---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudsentinel-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudsentinel-agent
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudsentinel-agent

      # hostNetwork lets the agent see the node's real network
      # interfaces (eth0, etc.) so tc rules actually shape the
      # node's traffic, not just the pod's virtual interface.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Give the agent up to 30s to drain on SIGTERM. The internal
      # graceful shutdown stops every active fault (tc rules, disk
      # filler files, memory buffers, CPU goroutines) before the
      # gRPC server returns, so the kubelet must wait for that work
      # to finish.
      terminationGracePeriodSeconds: 30

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      volumes:
        # emptyDir mounted at /tmp/cloudsentinel-faults so the disk
        # fill fault can write filler files even though the root
        # filesystem is read-only. emptyDir is wiped on pod restart,
        # which gives us automatic cleanup of orphaned files.
        - name: fault-scratch
          emptyDir: {}

      # Init container: clean up any tc qdisc that a previous agent
      # crash might have left behind. Best-effort: errors are logged
      # but never block the main container from starting.
      initContainers:
        - name: cleanup-orphans
          image: registry.k8s.io/build-image/debian-iptables:bookworm-v1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "removing any leftover tc qdisc on eth0 ..."
              tc qdisc del dev eth0 root 2>/dev/null || true
              echo "init cleanup done"
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN

      containers:
        - name: agent
          image: cloudsentinel-agent:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: fault-scratch
              mountPath: /tmp/cloudsentinel-faults
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # NET_ADMIN is required to invoke tc qdisc add/del.
              # The fault code never escalates, never exec()s a shell,
              # and the binary itself runs as user 65532, so this is
              # the minimum capability set for the network fault to
              # work.
              add:
                - NET_ADMIN
---
apiVersion: v1
kind: Service
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel-agent
spec:
  selector:
    app.kubernetes.io/name: cloudsentinel-agent
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
    - name: grpc
      port: 50051
      targetPort: grpc
  clusterIP: None   # headless: one IP per pod via DNS
