---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudsentinel-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudsentinel-agent
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudsentinel-agent
      hostNetwork: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: cloudsentinel-agent:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: cloudsentinel-agent
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel-agent
spec:
  selector:
    app.kubernetes.io/name: cloudsentinel-agent
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
    - name: grpc
      port: 50051
      targetPort: grpc
  clusterIP: None   # headless: one IP per pod via DNS
